<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Offline — Aurora Tonight</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background-color: #070b14;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      text-align: center;
    }
    .card {
      max-width: 420px;
      width: 100%;
    }
    .logo {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }
    .logo span.green { color: #34d399; }
    .logo span.purple { color: #a78bfa; }
    .tagline {
      font-size: 0.875rem;
      color: #64748b;
      margin-bottom: 2.5rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .icon {
      font-size: 3.5rem;
      margin-bottom: 1.5rem;
      display: block;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      color: #f1f5f9;
      margin-bottom: 0.75rem;
      line-height: 1.4;
    }
    p {
      font-size: 0.9375rem;
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 1rem;
    }
    .note {
      font-size: 0.8125rem;
      color: #475569;
      margin-bottom: 2rem;
    }
    button {
      background-color: #34d399;
      color: #070b14;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 0.5rem;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.15s;
    }
    button:hover { background-color: #6ee7b7; }
    button:active { background-color: #10b981; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <span class="green">Aurora</span> <span class="purple">Tonight</span>
    </div>
    <p class="tagline">Northern lights forecast</p>
    <span class="icon" aria-hidden="true">🌌</span>
    <h1>You're offline — aurora data requires an internet connection</h1>
    <p>Live Kp index, solar wind readings, and cloud cover forecasts can't be loaded without a network connection.</p>
    <p class="note">The live forecast will load automatically when you reconnect.</p>
    <button onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
